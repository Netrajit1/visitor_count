<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visitors Counter</title>

<style>

body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:Calibri, Arial, sans-serif;
}

.counter{
    font-size:22px;
    font-weight:bold;
    color:#000000;
    white-space:nowrap;
}

</style>

</head>

<body>

<div class="counter">
    Visitors Count:
    <span id="visitorCount">Loading...</span>
</div>

<script>

fetch("https://api.countapi.xyz/hit/nectar-geomatics-portal/visitors")
.then(response => response.json())
.then(data => {
    document.getElementById("visitorCount").textContent = data.value;
})
.catch(() => {
    document.getElementById("visitorCount").textContent = "0";
});

</script>

</body>
</html>
