<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
}
.counter{
    background:#111;
    color:#fff;
    padding:12px 18px;
    display:inline-block;
    font-size:28px;
    font-weight:600;
}
.count{
    color:#1E88E5;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="counter">
    Visitors Count :
    <span id="count" class="count">Loading...</span>
</div>

<script>
fetch("count.txt")
.then(r => r.text())
.then(data => {
    document.getElementById("count").innerHTML = data;
});
</script>

</body>
</html>
